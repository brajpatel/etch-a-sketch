<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Etch-a-Sketch</title>
</head>
<body>

    <div class="container">

        <h1>Etch-a-sketch</h1>

        <div class="inner-container">
            <div class="settings">
                <input id="color-pick" type="color" value="#171717">
                <button>Clear Grid</button>
                <div id="grid-size" class="size-value">16 x 16</div>
                <input type="range" id="grid-slider" min="2" max="32">
            </div>

            <div id="grid"></div>
        </div>
    </div>
    

    
<script src="app.js"></script>
</body>
</html>
